<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AppleSheep Blog</title>
    <script type="text/javascript">
      ;(function (l) {
        if (l.search && l.search.startsWith('?/')) {
          const decoded = l.search.slice(2).split('&').map(s => s.replace(/~and~/g, '&')).join('&')
          const newUrl = l.pathname.replace(/\/index\.html$/, '/') + decoded + l.hash
          window.history.replaceState(null, '', newUrl)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
